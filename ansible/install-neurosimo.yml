---
- name: Setup an environment for NeuroSimo
  hosts: localhost
  connection: local
  become: yes

  vars:
    # The user that runs the playbook.
    target_user: "{{ lookup('env', 'USER') }}"
    target_home: "/home/{{ target_user }}"

    # The repository root.
    repo_root: "{{ playbook_dir | dirname }}"

    # Location of user projects.
    projects_root: "{{ target_home }}/projects"

    # ROS distro
    ros_distro: "jazzy"

  tasks:
    ########################################################################
    # OS Guard: ensure we're on Ubuntu 24.04 (noble)
    ########################################################################
    - name: Assert Ubuntu 24.04 / noble
      assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
          - ansible_facts.distribution_release == "noble"
        fail_msg: "This playbook is intended for Ubuntu 24.04 (noble). Detected {{ ansible_facts.distribution }} {{ ansible_facts.distribution_release }}"

    ########################################################################
    # Update apt cache
    ########################################################################
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600 # in seconds

    ########################################################################
    # Install Node.js 18 LTS from NodeSource
    ########################################################################
    - name: Remove old Node.js packages
      apt:
        name:
          - nodejs
          - libnode-dev
          - libnode72
        state: absent
        purge: yes
      ignore_errors: yes

    - name: Check if NodeSource repository is configured
      stat:
        path: /etc/apt/sources.list.d/nodesource.list
      register: nodesource_repo

    - name: Download and run NodeSource setup script
      shell: curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
      when: not nodesource_repo.stat.exists

    - name: Install Node.js 18 from NodeSource
      apt:
        name: nodejs
        state: present
        update_cache: yes

    ########################################################################
    # Install extra packages (net-tools, Wireshark, etc.)
    ########################################################################
    - name: Install other tools, e.g., for troubleshooting
      apt:
        name:
          - net-tools
          - wireshark
          - wmctrl
          - python3-pip
        state: present

    ########################################################################
    # Kernel tools
    #
    # Install extra kernel tools for monitoring/troubleshooting.
    # RT variants (linux-*-realtime) are not always available, so
    # only install if they are.
    ########################################################################
    - name: Gather kernel tool candidates
      set_fact:
        kernel_tool_candidates:
          - linux-tools-generic
          - linux-cloud-tools-generic
          - linux-tools-realtime
          - linux-cloud-tools-realtime
          - "linux-tools-{{ ansible_facts.kernel }}"
          - "linux-cloud-tools-{{ ansible_facts.kernel }}"

    - name: Check which kernel tool packages are available
      command: "apt-cache show {{ item }}"
      register: pkg_info
      changed_when: false
      failed_when: false
      loop: "{{ kernel_tool_candidates }}"

    - name: Install available kernel tool packages
      apt:
        name: "{{ item.item }}"
        state: present
      loop: "{{ pkg_info.results }}"
      when: item.rc == 0

    ########################################################################
    # Copy systemd service files & enable
    ########################################################################
    - name: Detect DISPLAY for target user
      shell: echo $DISPLAY
      become: no
      register: user_display
      changed_when: false

    - name: Set display_number variable
      set_fact:
        display_number: "{{ user_display.stdout | default(':0') }}"

    - name: Copy NeuroSimo service
      template:
        src: files/neurosimo.service.j2
        dest: /etc/systemd/system/neurosimo.service
        owner: root
        group: root
        mode: "0644"

    - name: Copy NeuroSimo log follower service
      template:
        src: files/neurosimo-logs.service.j2
        dest: /etc/systemd/system/neurosimo-logs.service
        owner: root
        group: root
        mode: "0644"

    - name: Copy set-cpupower.service
      copy:
        src: files/set-cpupower.service
        dest: /etc/systemd/system/set-cpupower.service
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable NeuroSimo services
      systemd:
        name: "{{ item }}"
        enabled: yes
      loop:
        - neurosimo.service
        - neurosimo-logs.service

    - name: Enable set-cpupower.service
      systemd:
        name: set-cpupower.service
        enabled: yes

    - name: Restart set-cpupower.service
      systemd:
        name: set-cpupower.service
        state: restarted

    ########################################################################
    # Copy sysctl configuration
    ########################################################################
    - name: Copy 10-net-buffer-size.conf
      copy:
        src: files/10-net-buffer-size.conf
        dest: /etc/sysctl.d/10-net-buffer-size.conf
        owner: root
        group: root
        mode: "0644"

    - name: Reload sysctl
      shell: sysctl --system

    ########################################################################
    # Disable automatic upgrades and unattended updates
    ########################################################################
    - name: Stop and disable apt-daily timers
      systemd:
        name: "{{ item }}"
        enabled: no
        state: stopped
        masked: yes
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
        - apt-daily.service
        - apt-daily-upgrade.service

    - name: Disable unattended-upgrades service
      systemd:
        name: unattended-upgrades
        enabled: no
        state: stopped
        masked: yes

    - name: Configure APT periodic to disable all automatic updates
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: '0644'
        content: |
          APT::Periodic::Update-Package-Lists "0";
          APT::Periodic::Unattended-Upgrade "0";
          APT::Periodic::Download-Upgradeable-Packages "0";
          APT::Periodic::AutocleanInterval "0";

    - name: Disable unattended-upgrades in config
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades-override
        owner: root
        group: root
        mode: '0644'
        content: |
          Unattended-Upgrade::Allowed-Origins {};

    - name: Remove update-notifier if installed
      apt:
        name: update-notifier
        state: absent
      ignore_errors: yes

    ########################################################################
    # Configure PipeWire/PulseAudio over TCP
    ########################################################################
    - name: Create PipeWire TCP audio configuration directory
      file:
        path: /etc/pipewire/pipewire-pulse.conf.d
        state: directory
        mode: '0755'

    - name: Configure PipeWire for TCP audio access
      copy:
        dest: /etc/pipewire/pipewire-pulse.conf.d/tcp-audio.conf
        content: |
          # Enable TCP audio access for Docker containers and localhost
          # Equivalent to PulseAudio's: load-module module-native-protocol-tcp auth-ip-acl=127.0.0.1;172.17.0.0/16 auth-anonymous=1
          pulse.properties = {
            server.address = [
              "unix:native"
              {
                address = "tcp:127.0.0.1:4713"
                client.access = "allow"
              }
              {
                address = "tcp:172.17.0.0/16:4713"
                client.access = "allow"
              }
            ]
          }
        mode: '0644'

    - name: Restart PipeWire services to apply TCP configuration
      shell: |
        systemctl --user daemon-reload
        systemctl --user restart pipewire pipewire-pulse wireplumber
      become: no
      args:
        executable: /bin/bash
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.user_uid }}"

    ########################################################################
    # Give the user passwordless sudo for specific commands
    ########################################################################
    - name: Allow user to restart NeuroSimo without sudo password
      lineinfile:
        path: /etc/sudoers.d/restart_containers
        line: "{{ target_user }} ALL=(ALL) NOPASSWD: /bin/systemctl restart neurosimo"
        create: yes
        mode: "0440"

    - name: Allow user to run the log script without sudo password
      lineinfile:
        path: /etc/sudoers.d/log_script
        line: "{{ target_user }} ALL=(ALL) NOPASSWD: {{ repo_root }}/scripts/log"
        create: yes
        mode: "0440"

    ########################################################################
    # Create a projects directory
    ########################################################################
    - name: Create projects directory
      file:
        path: "{{ projects_root }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    ########################################################################
    # Create .bash_neurosimo from scratch
    ########################################################################
    - name: Create fresh .bash_neurosimo file
      copy:
        dest: "{{ target_home }}/.bash_neurosimo"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        content: |
          # NeuroSimo environment configuration
          # This file is managed by Ansible - do not edit manually

          # Add NeuroSimo scripts to PATH
          export PATH=$PATH:{{ repo_root }}/scripts/

          # NeuroSimo root directory
          export NEUROSIMO_ROOT={{ repo_root }}

          # Projects directory
          export PROJECTS_ROOT={{ projects_root }}

          # ROS2 middleware configuration
          export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
          export CYCLONEDDS_URI=file://$NEUROSIMO_ROOT/config/cyclonedds.xml

          # Source NeuroSimo workspace if it exists
          if [ -f {{ repo_root }}/install/setup.bash ]; then
              source {{ repo_root }}/install/setup.bash
          fi

          # Export selected ROS variables from .env file if it exists
          if [ -f {{ repo_root }}/.env ]; then
              # Import values into the shell.
              source {{ repo_root }}/.env

              # Export ROS_DOMAIN_ID if set.
              if [ "${ROS_DOMAIN_ID+x}" = "x" ]; then
                  export ROS_DOMAIN_ID="${ROS_DOMAIN_ID}"
              fi

              # Export ROS_LOG_LEVEL if set.
              if [ "${ROS_LOG_LEVEL+x}" = "x" ]; then
                  export ROS_LOG_LEVEL="${ROS_LOG_LEVEL}"
              fi

              # Export ROS_AUTOMATIC_DISCOVERY_RANGE if set.
              if [ "${ROS_AUTOMATIC_DISCOVERY_RANGE+x}" = "x" ]; then
                  export ROS_AUTOMATIC_DISCOVERY_RANGE="${ROS_AUTOMATIC_DISCOVERY_RANGE}"
              fi
          fi

    - name: Ensure ROS2 base installation is sourced in .bashrc
      lineinfile:
        dest: "{{ target_home }}/.bashrc"
        line: "source /opt/ros/{{ ros_distro }}/setup.bash"
        state: present
        insertafter: EOF

    - name: Ensure .bash_neurosimo is sourced in .bashrc
      lineinfile:
        dest: "{{ target_home }}/.bashrc"
        line: "source {{ target_home }}/.bash_neurosimo"
        state: present
        insertafter: EOF
    
    ########################################################################
    # Set up the environment
    ########################################################################
    - name: Check if .env exists
      stat:
        path: "{{ repo_root }}/.env"
      register: env_file_status

    - name: Copy .env.example to .env if .env does not exist
      copy:
        src: files/.env.example
        dest: "{{ repo_root }}/.env"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
      when: not env_file_status.stat.exists
