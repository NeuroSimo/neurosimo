name: "Example protocol with predetermined trials"
description: "Demonstrates predetermined trial timing via prepare_trial"

safety:
  minimum_trial_interval: 2.0

stages:
  - stage:
      name: "predetermined_block"
      trials: 10
      notes: "Trials whose timing is determined upfront by prepare_trial"

  - rest:
      duration: 10.0

  - stage:
      name: "periodic_block"
      trials: 5
      notes: "Trials using periodic (closed-loop) timing"
