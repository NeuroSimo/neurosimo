services:
  eeg_bridge:
    build:
      context: .
      dockerfile: src/eeg_bridge/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  eeg_monitor:
    build:
      context: .
      dockerfile: src/eeg_monitor/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    privileged: true
    network_mode: host

  eeg_simulator:
    build:
      context: .
      dockerfile: src/eeg_simulator/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    privileged: true
    network_mode: host

  eeg_replay:
    build:
      context: .
      dockerfile: src/eeg_replay/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - "$PROJECTS_ROOT:/app/projects"
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  experiment_coordinator:
    build:
      context: .
      dockerfile: src/experiment_coordinator/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - "$PROJECTS_ROOT:/app/projects"
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  # Non-GPU version of decider
  decider_non_gpu:
    build:
      context: .
      dockerfile: src/decider/Dockerfile
    user: "1000:1000"
    ulimits:
      rtprio: 99
      memlock: -1
    env_file:
      - .env
    environment:
      - USE_GPU=false
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - "$PROJECTS_ROOT:/app/projects"
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host
    profiles:
      - non-gpu

  # GPU-enabled version of decider
  decider:
    build:
      context: .
      dockerfile: src/decider/Dockerfile
    user: "1000:1000"
    ulimits:
      rtprio: 99
      memlock: -1
    env_file:
      - .env
    environment:
      - USE_GPU=true
      - NVIDIA_VISIBLE_DEVICES=all
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - "$PROJECTS_ROOT:/app/projects"
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

  global_configurator:
    build:
      context: .
      dockerfile: src/global_configurator/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  project_manager:
    build:
      context: .
      dockerfile: src/project_manager/Dockerfile
    user: "1000:1000"
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - './bundled_projects:/app/bundled_projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  preprocessor:
    build:
      context: .
      dockerfile: src/preprocessor/Dockerfile
    user: "1000:1000"
    ulimits:
      rtprio: 99
      memlock: -1
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  presenter:
    build:
      context: .
      dockerfile: src/presenter/Dockerfile
    user: "1000:1000"
    ulimits:
      rtprio: 99
      memlock: -1
    env_file:
      - .env
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
      # Mount PipeWire configuration and sockets
      - '~/.config/pipewire:/root/.config/pipewire'
      - '/run/user/${UID:-1000}/pipewire-0:/run/user/0/pipewire-0'
    environment:
      # Needed for X11 forwarding.
      - DISPLAY
      # PipeWire/PulseAudio compatibility
      - PULSE_SERVER=unix:/run/user/0/pipewire-0
      - XDG_RUNTIME_DIR=/run/user/0
      # ROS environment
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    network_mode: host
    devices:
      # Provide access to sound devices
      - "/dev/snd:/dev/snd"

  resource_monitor:
    build:
      context: .
      dockerfile: src/resource_monitor/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  session_configurator:
    build:
      context: .
      dockerfile: src/session_configurator/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host
  
  session_exporter:
    build:
      context: .
      dockerfile: src/session_exporter/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  session_manager:
    build:
      context: .
      dockerfile: src/session_manager/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      # Allow session manager to restart containers if they timeout during session finalization.
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: host

  session_recorder:
    build:
      context: .
      dockerfile: src/session_recorder/Dockerfile
    user: "1000:1000"
    env_file:
      - .env
      - .git_provenance.env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  recording_manager:
    build:
      context: .
      dockerfile: src/recording_manager/Dockerfile
    user: "1000:1000"
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  stimulation_tracer:
    build:
      context: .
      dockerfile: src/stimulation_tracer/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host

  trigger_timer:
    build:
      context: .
      dockerfile: src/trigger_timer/Dockerfile
    env_file:
      - .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
      # XXX: This is a workaround to allow access to LabJack devices over reconnects. The correct
      #   solution would likely involve modifying the LabJack installation scripts to work properly
      #   within a Docker container. This workaround increases security risks by exposing all host
      #   devices to the container. Note that "privileged: true" should theoretically provide the
      #   same access, but in practice, it does not seem to suffice.
      - "/dev:/dev"
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  # Frontend-related services
  rosbridge:
    build:
      context: .
      dockerfile: src/rosbridge/Dockerfile
      args:
        INTERFACES_PATH: interfaces
    env_file:
      - .env
    environment:
      - ROSBRIDGE_PORT=9090
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID
    volumes:
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: host
