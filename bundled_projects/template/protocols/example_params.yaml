name: "Example protocol"
description: "An example protocol consisting of 10 trials in a single stage"

safety:
  minimum_trial_interval: 2.0   # minimum seconds between consecutive trials

# Runtime parameters set in the UI and passed to the decider.
runtime_parameters:
  conditioning_intensity:
    label: Intensity 1
    type: float
    unit: "% MSO"
    required: true
    min: 0
    max: 100

  test_intensity:
    label: Intensity 2
    type: float
    unit: "% MSO"
    required: true
    min: 0
    max: 100

stages:
  - stage:
      name: "example_stage"
      trials: 10
